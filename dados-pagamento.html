<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pagamento - Exclusive 3D Mats</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="max-w-5xl w-full bg-white rounded-xl shadow-lg p-6 grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- FORMULÁRIO -->
        <div>

            <h2 class="text-2xl font-bold mb-4">Dados para pagamento</h2>

            <form id="payment-form" class="space-y-3">

                <input id="nome" type="text" placeholder="Nome completo" class="w-full border p-2 rounded">

                <input id="email" type="email" placeholder="Email" class="w-full border p-2 rounded">

                <input id="cpf" type="text" placeholder="CPF" class="w-full border p-2 rounded">

                <input id="telefone" type="text" placeholder="Telefone" class="w-full border p-2 rounded">

                <h3 class="font-semibold mt-4">Frete</h3>

                <label class="flex gap-2">
                    <input type="radio" name="frete" value="0" checked>
                    Frete grátis
                </label>

                <label class="flex gap-2">
                    <input type="radio" name="frete" value="19.90">
                    Frete expresso (R$ 19,90)
                </label>

                <button type="submit" id="btn-pagar" class="bg-green-600 text-white w-full py-2 rounded mt-4">

                    Gerar PIX

                </button>

            </form>

        </div>

        <!-- RESUMO -->
        <div>

            <h2 class="text-xl font-bold mb-4">Resumo do pedido</h2>

            <div class="space-y-2">

                <p>Produto: <span id="resumo-kit"></span></p>

                <p>Veículo: <span id="resumo-veiculo"></span></p>

                <p>Preço: <span id="resumo-preco"></span></p>

                <p class="font-bold text-lg">
                    Total: <span id="total-final"></span>
                </p>

            </div>

            <div id="pix-area" class="hidden mt-6">

                <h3 class="text-lg font-bold mb-2">Pague via PIX</h3>

                <img id="pix-qrcode" class="w-48">

                <textarea id="pix-key" class="w-full border p-2 rounded mt-2" rows="3" readonly>
</textarea>

                <button id="copy-pix" class="bg-blue-500 text-white px-4 py-2 rounded mt-2">

                    Copiar código PIX

                </button>

                <p class="mt-3">
                    Tempo restante: <span id="timer">05:00</span>
                </p>

                <div id="status-box" class="mt-2 text-green-600"></div>

            </div>

        </div>

    </div>

    <script>

        const urlParams = new URLSearchParams(window.location.search)

        const kitNome = urlParams.get("kit") || "Kit 3D Mats"
        const veiculoNome = urlParams.get("veiculo") || "Veículo"

        const valorBase = parseFloat(urlParams.get("valor")) || 97

        let freteSelecionado = 0

        const resumoKit = document.getElementById("resumo-kit")
        const resumoVeiculo = document.getElementById("resumo-veiculo")
        const resumoPreco = document.getElementById("resumo-preco")
        const totalFinal = document.getElementById("total-final")

        resumoKit.innerText = kitNome
        resumoVeiculo.innerText = veiculoNome
        resumoPreco.innerText = `R$ ${valorBase.toFixed(2).replace(".", ",")}`

        totalFinal.innerText = `R$ ${valorBase.toFixed(2).replace(".", ",")}`

        document.querySelectorAll("input[name='frete']").forEach(radio => {

            radio.addEventListener("change", () => {

                freteSelecionado = parseFloat(radio.value)

                const total = valorBase + freteSelecionado

                totalFinal.innerText =
                    `R$ ${total.toFixed(2).replace(".", ",")}`

            })

        })

        document.getElementById("payment-form").addEventListener("submit", async (e) => {

            e.preventDefault()

            const btn = document.getElementById("btn-pagar")

            if (btn.disabled) return

            btn.disabled = true
            btn.innerText = "Gerando PIX..."

            const nome = document.getElementById("nome").value.trim()
            const email = document.getElementById("email").value.trim()
            const cpf = document.getElementById("cpf").value.trim()
            const telefone = document.getElementById("telefone").value.trim()

            const phoneClean = telefone.replace(/\D/g, '')

            if (!nome || !email || !cpf || phoneClean.length < 10) {

                alert("Preencha todos os campos corretamente.")

                btn.disabled = false
                btn.innerText = "Gerar PIX"

                return
            }

            const total = valorBase + freteSelecionado

            try {

                const response = await fetch("/api/gerar-pix", {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({

                        nome,
                        email,
                        cpf,
                        telefone: phoneClean,
                        valor: total,
                        produto: kitNome,
                        veiculo: veiculoNome

                    })

                })

                const result = await response.json()

                const pixCode =
                    result.pix_code ||
                    result.paymentCode ||
                    result.copyPaste

                const pixQr =
                    result.pix_qr_code ||
                    result.qrcode_image

                if (!pixCode) {

                    alert("Erro ao gerar PIX")

                    btn.disabled = false
                    btn.innerText = "Gerar PIX"

                    return
                }

                document.getElementById("pix-area").classList.remove("hidden")

                document.getElementById("pix-key").value = pixCode

                if (pixQr) {

                    document.getElementById("pix-qrcode").src = pixQr

                }

                startTimer(300)

                const transactionId =
                    result.transaction_id ||
                    result.id ||
                    result.txid

                checkPayment(transactionId)

            } catch (err) {

                console.error(err)

                alert("Erro ao gerar pagamento")

                btn.disabled = false
                btn.innerText = "Gerar PIX"

            }

        })

        function startTimer(duration) {

            let timer = duration

            const display = document.getElementById("timer")

            const interval = setInterval(() => {

                const minutes = String(Math.floor(timer / 60)).padStart(2, '0')

                const seconds = String(timer % 60).padStart(2, '0')

                display.textContent = `${minutes}:${seconds}`

                if (--timer < 0) {

                    clearInterval(interval)

                    display.textContent = "Expirado"

                }

            }, 1000)

        }

        document.getElementById("copy-pix").addEventListener("click", () => {

            const pixKey = document.getElementById("pix-key")

            pixKey.select()

            document.execCommand("copy")

            document.getElementById("status-box").innerText =
                "✔ Código PIX copiado"

        })

        async function checkPayment(transactionId) {

            if (!transactionId) return

            const interval = setInterval(async () => {

                try {

                    const response = await fetch(`/api/check-payment?id=${transactionId}`)

                    const data = await response.json()

                    if (data.status === "paid") {

                        clearInterval(interval)

                        window.location.href =
                            `/obrigado.html?tx=${transactionId}`

                    }

                } catch (err) {

                    console.error(err)

                }

            }, 5000)

        }

    </script>

</body>

</html>
